name: Build and release Windows IL2CPP

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag, for example v1.0.0 (leave empty for build only)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: unity-windows-il2cpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64 IL2CPP
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Verify Unity license secrets
        shell: pwsh
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:UNITY_LICENSE) -and [string]::IsNullOrWhiteSpace($env:UNITY_SERIAL)) {
            $missing += "UNITY_LICENSE or UNITY_SERIAL"
          }
          if ([string]::IsNullOrWhiteSpace($env:UNITY_EMAIL)) { $missing += "UNITY_EMAIL" }
          if ([string]::IsNullOrWhiteSpace($env:UNITY_PASSWORD)) { $missing += "UNITY_PASSWORD" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing repository secrets: $($missing -join ', '). See .github/UNITY_LICENSE_SETUP.md."
            exit 1
          }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-StandaloneWindows64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-StandaloneWindows64-

      - name: Build Windows player with IL2CPP
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 2022.3.62f3
          targetPlatform: StandaloneWindows64
          buildName: UmaViewer
          buildsPath: build

      - name: Package Windows build
        shell: pwsh
        run: >-
          Compress-Archive
          -Path "build/StandaloneWindows64/*"
          -DestinationPath "UmaViewer-Windows-x64.zip"
          -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: UmaViewer-Windows-x64
          path: UmaViewer-Windows-x64.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          gh release create $env:RELEASE_TAG `
            "UmaViewer-Windows-x64.zip#UmaViewer Windows x64 (IL2CPP)" `
            --target $env:GITHUB_SHA `
            --title "UmaViewer $env:RELEASE_TAG" `
            --generate-notes
